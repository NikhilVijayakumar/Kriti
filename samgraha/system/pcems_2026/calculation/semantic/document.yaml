id: semantic_document_v1
calculation: sum_capped_at_100
scope: document
inputs:
  from: audit/semantic/document/{domain}.md
  fields: [criterion_id, points, mandatory, passed]
formula: |
  score = min(100, sum(points) where passed=true)
rollup: null   # document scope — one score, no rollup needed
note: >
  pcems_2026 has no deterministic layer and no section-scoped audits —
  one rubric file per paper domain (title-and-metadata, introduction,
  methodology, findings, conclusion, references), same shape as
  base_dev's audit/semantic/document/{domain}.md. Each domain's criteria
  were derived from the standard's original cross-cutting quality checks
  (typography, media placement, PDF compliance, originality, tone,
  evidence, structural transitions, citations, complexity/baselines),
  redistributed to whichever section each check actually applies to —
  e.g. media-and-tables lives in findings, pdf-compliance and
  originality-verification live in title-and-metadata as the
  whole-submission checkpoint. Mandatory criterion failure forfeits that
  criterion's points entirely, no partial credit.
