id: semantic_document_v1
calculation: sum_capped_at_100
scope: document
inputs:
  from: audit/semantic/document/{domain}.md
  fields: [criterion_id, points, mandatory, passed]
formula: |
  score = min(100, sum(points) where passed=true)
rollup: null   # document scope — one score, no rollup needed
note: >
  eswa_journal has no deterministic layer and no section-scoped audits —
  one rubric file per paper domain (abstract, introduction, related-work,
  problem-definition, methodology, experimental-setup, results,
  implications, limitations, conclusion, references), same shape as
  base_dev's audit/semantic/document/{domain}.md. Each domain's criteria
  were derived from the standard's original cross-cutting quality checks
  (tone, evidence, structural transitions, citations, complexity/
  baselines), redistributed to whichever section each check actually
  applies to — e.g. citation-integrity lives in related-work and
  references, complexity-and-baselines lives in methodology and
  experimental-setup. Mandatory criterion failure forfeits that
  criterion's points entirely, no partial credit.
