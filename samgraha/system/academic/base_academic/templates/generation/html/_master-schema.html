<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; line-height: 1.6; }
        h1 { border-bottom: 2px solid #2c3e50; padding-bottom: 0.5rem; }
        h2 { color: #2c3e50; margin-top: 2rem; }
        h3 { color: #34495e; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.5rem 0.8rem; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        code { background: #f4f4f4; padding: 0.15rem 0.3rem; border-radius: 3px; font-size: 0.9em; }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow-x: auto; }
        pre code { background: none; padding: 0; }
        .mermaid { text-align: center; margin: 1rem 0; }
        blockquote { border-left: 4px solid #2c3e50; margin: 1rem 0; padding: 0.5rem 1rem; background: #f8f9fa; }
        .meta { color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p class="meta">{{ authors }} — {{ date }}</p>

    {{{ content }}}

</body>
</html>
