# base_academic — samgraha standard manifest.
#
# Academic-paper class: generates paper sections from project documentation,
# audits with both deterministic and semantic checks, fixes failures,
# checks for AI fingerprints, humanizes flagged sections, and renders
# dual-track outputs (paper + audit report).
#
# 2-state classification gate: NO_DOCS (refuse) / HAS_DOCS (proceed).
# Deterministic + semantic audit layer, 50/50 weight split.
# Concrete systems (pcems_2026, eswa_journal) override domain lists,
# rubric content, and generation templates.

name: base_academic

classify_repo:
  min_doc_words: 200

scripts:
  # --- schema-init usecase ---
  - name: init-schema
    location: ../schema-init/init_schema.py
    purpose: "create base_academic's own tables (20 academic_* tables) if missing, seed domains and templates"
  # --- classify-repo usecase ---
  - name: classify-repo
    location: ../classify-repo/classify_repo.py
    purpose: "entry router — scan repo for documentation, classify into NO_DOCS / HAS_DOCS"
  # --- shared: novelty-analysis + gap-analysis + mathematics-and-diagrams ---
  - name: discover-modules
    location: ../_shared/analysis/discover_modules.py
    purpose: "discover module boundaries (top-level packages) in the target repo; persist to academic_modules"
  - name: gather-module-evidence
    location: ../_shared/analysis/gather_module_evidence.py
    purpose: "gather one module's source files, imports, docstrings, signatures"
  - name: gather-cross-module-evidence
    location: ../_shared/analysis/gather_cross_module_evidence.py
    purpose: "aggregate every module's evidence + repo-wide import graph"
  - name: persist-module-analysis
    location: ../_shared/analysis/persist_module_analysis.py
    purpose: "persist one module's analysis section + write to docs/paper/{system}/modules/"
  - name: persist-cross-module-analysis
    location: ../_shared/analysis/persist_cross_module_analysis.py
    purpose: "persist cross-module analysis + write to docs/paper/{system}/cross_module/"
  # --- shared: assemble-paper-structure + semantic-audit ---
  - name: gather-domain-evidence
    location: ../_shared/gather_domain_evidence.py
    purpose: "gather evidence for a domain — pulls docs, analysis, or draft text depending on context"
  # --- assemble-paper-structure usecase ---
  - name: persist-section-draft
    location: ../assemble-paper-structure/persist_section_draft.py
    purpose: "persist generated/humanized section draft"
  # --- deterministic-audit usecase ---
  - name: deterministic-audit
    location: ../deterministic-audit/deterministic_audit.py
    purpose: "run deterministic checks against calculation/deterministic/{domain}.yaml rules"
  # --- semantic-audit usecase ---
  - name: persist-domain-semantic-score
    location: ../semantic-audit/persist_domain_semantic_score.py
    purpose: "persist agent's per-domain semantic score"
  # --- plagiarism-forensic-audit usecase ---
  - name: gather-plagiarism-context
    location: ../plagiarism-forensic-audit/gather_plagiarism_context.py
    purpose: "gather current draft text for plagiarism/fingerprint check"
  - name: deterministic-fingerprint-check
    location: ../plagiarism-forensic-audit/deterministic_fingerprint_check.py
    purpose: "mechanical plagiarism pre-screen: burstiness, n-gram repetition, banned phrases"
  - name: persist-plagiarism-findings
    location: ../plagiarism-forensic-audit/persist_plagiarism_findings.py
    purpose: "persist plagiarism/fingerprint PASS/FAIL + flagged spans"
  # --- humanize usecase ---
  - name: gather-humanize-context
    location: ../humanize/gather_humanize_context.py
    purpose: "gather draft + flagged spans for humanize rewrite"
  - name: persist-humanize-pass
    location: ../humanize/persist_humanize_pass.py
    purpose: "persist humanize rewrite result + change summary + risk flags"
  # --- calculate usecase ---
  - name: calculate
    location: ../calculate/calculate.py
    purpose: "compute final_score from semantic + deterministic buckets (50/50), track trend"
  # --- render-audit-report usecase ---
  - name: generate-audit-report
    location: ../render-audit-report/generate_audit_report.py
    purpose: "populate audit report template from score/audit/plagiarism results"
  - name: render-charts
    location: ../render-audit-report/render_charts.py
    purpose: "generate chart images from score/audit data (matplotlib Agg backend)"

prompts:
  # --- novelty-analysis usecase ---
  - name: module-analysis-novelty
    location: ../../prompt/novelty-analysis/module-analysis-novelty.md
  - name: cross-module-analysis-novelty
    location: ../../prompt/novelty-analysis/cross-module-analysis-novelty.md
  # --- gap-analysis usecase ---
  - name: module-analysis-gaps
    location: ../../prompt/gap-analysis/module-analysis-gaps.md
  - name: cross-module-analysis-gaps
    location: ../../prompt/gap-analysis/cross-module-analysis-gaps.md
  # --- mathematics-and-diagrams usecase ---
  - name: module-analysis-mathematics
    location: ../../prompt/mathematics-and-diagrams/module-analysis-mathematics.md
  - name: module-analysis-architecture
    location: ../../prompt/mathematics-and-diagrams/module-analysis-architecture.md
  - name: cross-module-analysis-architecture
    location: ../../prompt/mathematics-and-diagrams/cross-module-analysis-architecture.md
  - name: cross-module-analysis-dependencies
    location: ../../prompt/mathematics-and-diagrams/cross-module-analysis-dependencies.md
  - name: cross-module-analysis-interactions
    location: ../../prompt/mathematics-and-diagrams/cross-module-analysis-interactions.md
  - name: cross-module-analysis-mathematics   # registered, not yet dispatched — see run_full_workflow.py note
    location: ../../prompt/mathematics-and-diagrams/cross-module-analysis-mathematics.md
  # --- assemble-paper-structure usecase ---
  - name: generate-section
    location: ../../prompt/assemble-paper-structure/generate-section.md
  - name: literature-review-pass
    location: ../../prompt/assemble-paper-structure/literature-review-pass.md
  # --- semantic-audit usecase ---
  - name: semantic-audit
    location: ../../prompt/semantic-audit/semantic-audit.md
  # --- plagiarism-forensic-audit usecase ---
  - name: plagiarism-fingerprint-audit
    location: ../../prompt/plagiarism-forensic-audit/plagiarism-fingerprint-audit.md
  - name: targeted-rewrite
    location: ../../prompt/plagiarism-forensic-audit/targeted-rewrite.md
  # --- humanize usecase ---
  - name: humanize-section
    location: ../../prompt/humanize/humanifier.md
  # --- shared / not yet wired into any usecase's dispatch ---
  - name: module-analysis-summary
    location: ../../prompt/_shared/module-analysis-summary.md
  - name: cross-module-analysis-patterns
    location: ../../prompt/_shared/cross-module-analysis-patterns.md

custom_tables:
  - table_name: academic_papers
    purpose: "one row per registered paper (repo + system)"
    owner_script: init-schema
  - table_name: academic_repos
    purpose: "one row per (repo_root, system) classification result (2-state)"
    owner_script: classify-repo
  - table_name: academic_domains
    purpose: "lookup: scoring domains for the concrete system"
    owner_script: init-schema
  - table_name: academic_modules
    purpose: "one row per detected module in a repo"
    owner_script: discover-modules
  - table_name: academic_module_analysis
    purpose: "per (module, analysis_kind) section content"
    owner_script: persist-module-analysis
  - table_name: academic_cross_module_analysis
    purpose: "per (repo, analysis_kind) section content"
    owner_script: persist-cross-module-analysis
  - table_name: academic_narratives
    purpose: "one row per (paper, domain) — stores section drafts with stage (generate/humanize) and iteration"
    owner_script: persist-section-draft
  - table_name: academic_narrative_sections
    purpose: "per-narrative heading+text sections"
    owner_script: persist-section-draft
  - table_name: academic_semantic_runs
    purpose: "one row per (paper, domain, model) semantic evaluation"
    owner_script: persist-domain-semantic-score
  - table_name: academic_semantic_dimension_scores
    purpose: "per-dimension score+evidence for a semantic run"
    owner_script: persist-domain-semantic-score
  - table_name: academic_semantic_findings
    purpose: "per-run strengths/weaknesses/recommendations"
    owner_script: persist-domain-semantic-score
  - table_name: academic_plagiarism_findings
    purpose: "per (paper, domain, run, pass_type, check_kind): PASS/FAIL + flagged spans"
    owner_script: persist-plagiarism-findings
  - table_name: academic_humanize_passes
    purpose: "per (paper, domain, iteration): change summary + risk flags"
    owner_script: persist-humanize-pass
  - table_name: academic_templates
    purpose: "catalog of report/generation templates on disk"
    owner_script: init-schema
  - table_name: academic_score_history
    purpose: "one row per calculate.py run (trend tracking)"
    owner_script: calculate
  - table_name: academic_deterministic_findings
    purpose: "per (paper, domain, run): deterministic audit verdict + findings"
    owner_script: deterministic-audit
  - table_name: academic_visualization_types
    purpose: "chart type catalog"
    owner_script: init-schema
  - table_name: academic_visualizations
    purpose: "one row per rendered chart image"
    owner_script: render-charts
  - table_name: academic_report_history
    purpose: "one row per render run (paper or audit track)"
    owner_script: render-paper

usecases:
  - name: schema-init
    description: "create base_academic's own tables before anything else writes to them"
    steps:
      - order: 1
        kind: deterministic
        description: "Create 20 academic_* tables, seed domains and templates"
        script: init-schema

  - name: classify-repo
    description: "entry router — scan repo for documentation, classify into NO_DOCS / HAS_DOCS"
    steps:
      - order: 1
        kind: deterministic
        description: "Scan repo for author-supplied documentation; persist classification"
        script: classify-repo

  - name: novelty-analysis
    description: "identify what's novel, sourced from the repo's actual documentation"
    steps: []
    # Per-module + cross-module triads expanded at runtime by expand_triads()

  - name: gap-analysis
    description: "identify gaps, sourced from the repo's actual documentation"
    steps: []
    # Per-module + cross-module triads expanded at runtime by expand_triads()

  - name: mathematics-and-diagrams
    description: "derive mathematical formalization and mermaid diagrams from documentation"
    steps: []
    # Per-module (math + architecture) + cross-module triads expanded at runtime

  - name: assemble-paper-structure
    description: "generate every structural domain from documentation, weaving in novelty/gap/math findings"
    steps: []
    # Per-domain triads + conditional literature-review step expanded at runtime

  - name: deterministic-audit
    description: "run deterministic mechanical checks before semantic scoring (cheap fail-fast)"
    steps: []
    # Per-domain single-step expanded at runtime

  - name: semantic-audit
    description: "score a domain draft against the concrete system's rubric"
    steps: []

  - name: plagiarism-forensic-audit
    description: "deterministic pre-screen + semantic forensic audit + conditional targeted rewrite"
    steps: []
    # 5-step per-domain expanded at runtime

  - name: humanize
    description: "Pass 3: full 3-layer humanize rewrite — triggered only for domains still above risk threshold"
    steps: []

  - name: calculate
    description: "calculate final scores from semantic + deterministic buckets, track trend"
    steps: []
    # Single-step, expanded at runtime when calculate.py is built

  - name: render-audit-report
    description: "score-driven audit report with charts and trend visualization"
    steps: []
    # Single-step, expanded at runtime when generate-audit-report.py is built

  - name: render-paper
    description: "assemble paper from domain drafts, render through HTML/PDF/DOCX"
    steps: []
    # Single-step, expanded at runtime when assemble-final-document.py is built
