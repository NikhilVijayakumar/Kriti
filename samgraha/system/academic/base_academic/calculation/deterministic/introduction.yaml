id: introduction
domain: introduction
checks:
  - id: in-001
    name: contributions_list
    rule: regex_match
    severity: warning
    config: { pattern: "(?i)(?:contributions|we\\s+make|our\\s+contributions)" }
    description: "Contributions section present"
  - id: in-002
    name: has_list_items
    rule: min_list_items
    severity: warning
    config: { min: 2 }
    description: "Contributions are listed (bulleted/numbered)"
  - id: in-003
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
