id: problem-definition
domain: problem-definition
checks:
  - id: pd-001
    name: notation_defined
    rule: regex_match
    severity: warning
    config: { pattern: "(?i)(?:notation|definition|let\\s|where\\s)" }
    description: "Symbol/notation definitions present"
  - id: pd-002
    name: assumptions_listed
    rule: regex_match
    severity: warning
    config: { pattern: "(?i)assumption" }
    description: "Assumptions explicitly listed"
  - id: pd-003
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
