id: mathematics
domain: mathematics
checks:
  - id: ma-001
    name: equations_present
    rule: contains_equation
    severity: warning
    description: "Equations/formulas present"
  - id: ma-002
    name: complexity_notation
    rule: regex_match
    severity: warning
    config: { pattern: "(?i)(?:O\\(|complexity)" }
    description: "Complexity notation present for algorithmic procedures"
  - id: ma-003
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
