id: novelty
domain: novelty
checks:
  - id: nv-001
    name: differentiation_targets
    rule: regex_match
    severity: warning
    config: { pattern: "(?i)(?:propose|introduce|novel|differs.from|unlike|contrast)" }
    description: "Novelty claims have differentiation targets"
  - id: nv-002
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
