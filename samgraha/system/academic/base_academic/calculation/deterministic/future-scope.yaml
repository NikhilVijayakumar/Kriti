id: future-scope
domain: future-scope
checks:
  - id: fs-001
    name: items_present
    rule: min_list_items
    severity: warning
    config: { min: 1 }
    description: "At least one future-scope item present"
  - id: fs-002
    name: derived_from_gaps
    rule: regex_match
    severity: warning
    config: { pattern: "(?i)(?:gap|limitation|open.question|future|extend|expand)" }
    description: "Items are derived from gap-analysis findings"
  - id: fs-003
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
