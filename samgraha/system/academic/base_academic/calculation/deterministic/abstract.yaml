id: abstract
domain: abstract
checks:
  - id: ab-001
    name: word_count_in_range
    rule: word_count_in_range
    severity: critical
    config: { min: 100, max: 500 }
    description: "Abstract word count within configured range"
  - id: ab-002
    name: contains_number
    rule: contains_number
    severity: warning
    description: "Abstract contains at least one quantitative result"
  - id: ab-003
    name: no_citations
    rule: no_citations
    severity: warning
    description: "Abstract contains no citation markers"
  - id: ab-004
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
