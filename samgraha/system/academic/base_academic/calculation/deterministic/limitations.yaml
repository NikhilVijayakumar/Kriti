id: limitations
domain: limitations
checks:
  - id: li-001
    name: limitations_present
    rule: min_list_items
    severity: warning
    config: { min: 1 }
    description: "At least one limitation listed"
  - id: li-002
    name: no_new_results
    rule: no_new_results
    severity: critical
    description: "No new results or claims introduced (cross-ref with results)"
  - id: li-003
    name: no_placeholders
    rule: no_placeholders
    severity: critical
    description: "No unfilled template markers"
