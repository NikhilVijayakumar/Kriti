id: final_score_v1
calculation: weighted_sum
inputs:
  - { name: semantic_document, weight: 100 }
formula: |
  final_score = semantic_document_score
note: >
  Single-bucket standard — semantic_document is the only calculation
  bucket academic-class systems define, so final_score passes it through
  unchanged rather than splitting weight across buckets that don't exist.
  Shared by pcems_2026 and eswa_journal (byte-identical except the
  system name in this note field).
