id: final_score_v1
calculation: weighted_sum
inputs:
  - { name: semantic_document, weight: 50 }
  - { name: deterministic_document, weight: 50 }
formula: |
  final_score = 0.5 * semantic_document_score + 0.5 * deterministic_document_score
note: >
  Two-bucket standard — semantic_document and deterministic_document are
  both required. 50/50 is the honest no-evidence-yet default; revisit
  once real papers have run through both audit kinds and an actual score
  distribution exists to calibrate against.
