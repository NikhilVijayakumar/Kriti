system_id: python_hackathon
domain: security
scope: document
kind: deterministic
standard_version: "1.0"
total_rules: 3
total_weight: 5.0

description: "SAST and secrets scanning via bandit and pattern matching."

rules:
  - id: sec-001
    description: "Bandit configuration present"
    condition: ".bandit file or tool.bandit block in pyproject.toml exists"
    message: "Missing bandit configuration for security linting."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: script_output
      script: script/audit_security.py
      check: bandit_config_present

  - id: sec-002
    description: "No HIGH severity bandit findings"
    condition: "bandit finds zero HIGH severity issues"
    message: "Bandit detected HIGH severity security issues in source code."
    severity: error
    weight: 2.0
    mandatory: true
    evidence:
      type: script_output
      script: script/audit_security.py
      check: bandit_high_severity_issues
      expected: 0

  - id: sec-003
    description: "No hardcoded secrets or API keys"
    condition: "no hardcoded secrets detected by pattern scan"
    message: "Potential hardcoded secrets or API keys detected in source files."
    severity: error
    weight: 2.0
    mandatory: true
    evidence:
      type: script_output
      script: script/audit_security.py
      check: hardcoded_secrets_found
      expected: 0
