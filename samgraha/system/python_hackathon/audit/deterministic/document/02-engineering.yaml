system_id: python_hackathon
domain: engineering
scope: document
kind: deterministic
standard_version: "1.0"
total_rules: 9
total_weight: 9.0

description: "Rules checking code quality configurations, type hinting, and code metrics."

rules:
  - id: eng-001
    description: "Radon configuration present"
    condition: "repository contains radon configuration (e.g., radon.cfg or in pyproject.toml)"
    message: "Missing radon configuration for cyclomatic complexity checks."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: file_presence
      targets: [radon.cfg, pyproject.toml]

  - id: eng-002
    description: "Type hints enabled"
    condition: "mypy or pyright configuration exists"
    message: "Missing static type checker configuration."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: config_analysis
      target: pyproject.toml
      check: type_checker_enabled

  - id: eng-003
    severity: warning
    weight: 1
    description: "Python linter configuration exists"
    check:
      file_globs:
        - ".flake8"
        - "setup.cfg"
        - "pyproject.toml"
        - ".ruff.toml"
        - "ruff.toml"

  - id: eng-004
    severity: warning
    weight: 1
    description: "Type checking configuration exists"
    check:
      file_globs:
        - "mypy.ini"
        - "mypy.cfg"
        - "pyproject.toml"
        - "pyrightconfig.json"

  - id: eng-005
    severity: info
    weight: 1
    description: "Pre-commit hooks configured"
    check:
      file_globs:
        - ".pre-commit-config.yaml"

  - id: eng-006
    description: "No high-complexity functions (radon grade C or worse)"
    condition: "radon_high_complexity_count == 0"
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: tool_execution
      target: radon_high_complexity_count
      threshold: 0
      op: eq

  - id: eng-007
    description: "No mypy type errors"
    condition: "mypy_error_count == 0"
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: tool_execution
      target: mypy_error_count
      threshold: 0
      op: eq

  - id: eng-008
    description: "CI/CD pipeline with real workflow content"
    condition: "repository contains .github/workflows/*.yml or .gitlab-ci.yml with on: triggers and jobs: blocks (not empty stubs)"
    message: "No CI/CD pipeline with real content found. Teams should have automated testing or build workflows."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: tool_execution
      target: cicd_real_content
      threshold: 1
      op: gte

  - id: eng-009
    description: "Codebase split across multiple directories"
    condition: "repository has at least 2 top-level directories (not counting hidden/venv/__pycache__)"
    message: "Everything appears to be in one directory. A structured codebase separates concerns."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: tool_execution
      target: top_level_dir_count
      threshold: 2
      op: gte
