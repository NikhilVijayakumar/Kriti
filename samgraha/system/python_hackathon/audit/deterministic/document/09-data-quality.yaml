system_id: python_hackathon
domain: data-quality
scope: document
kind: deterministic
standard_version: "1.0"
total_rules: 4
total_weight: 4.0

description: "Objective checks for data artifacts, source references, and model development methodology."

rules:
  - id: dq-001
    description: "Data directory or files present"
    condition: "repository contains a 'data/' directory or known data files (.csv, .parquet, .jsonl)"
    message: "No local data files or directories found."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: file_presence
      extensions: [.csv, .parquet, .jsonl, .json]
      directories: [data, dataset, datasets]

  - id: dq-002
    description: "Data sources referenced in README"
    condition: "README.md contains external links to kaggle, huggingface, or other known data hubs"
    message: "No external data sources referenced."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: regex_match
      target: README.md
      patterns: ["kaggle\\.com", "huggingface\\.co/datasets", "drive\\.google\\.com"]

  - id: dq-003
    description: "Train/test split or cross-validation evidenced in code"
    condition: "codebase contains train_test_split, cross-validation, or k-fold references"
    message: "No evidence of data splitting methodology found in code."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: regex_match
      target: README.md
      patterns: ["train_test_split", "cross.validation", "k.fold", "validation set",
                 "train.test.split", "model_selection", "StratifiedKFold", "TimeSeriesSplit"]

  - id: dq-004
    description: "Feature engineering or validation methodology documented in README"
    condition: "README.md describes feature engineering decisions or validation approach"
    message: "No methodology documentation found for feature engineering or validation."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: regex_match
      target: README.md
      patterns: ["feature engineering", "feature selection", "data leakage",
                 "cross.validation", "held.out", "validation set", "train.test",
                 "preprocessing", "normalization", "scaling", "encoding"]
