system_id: python_hackathon
domain: ai-explanations
scope: document
kind: deterministic
standard_version: "1.0"
total_rules: 2
total_weight: 2.0

description: "Objective checks for AI text generation capabilities and prompts."

rules:
  - id: ai-001
    description: "LLM SDK dependencies present"
    condition: "requirements.txt or pyproject.toml contains openai, anthropic, or google-generativeai"
    message: "No standard AI/LLM SDK dependencies found."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: dependency_presence
      packages: [openai, anthropic, google-generativeai, langchain, llama-index]

  - id: ai-002
    description: "Prompt templates exist"
    condition: "repository contains files indicative of prompt engineering (e.g., prompts.py, *.prompt, system_instructions.txt)"
    message: "No isolated prompt templates found; prompts may be hardcoded or missing."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: file_presence
      patterns: ["*prompt*", "system_instructions*", "instructions*"]
