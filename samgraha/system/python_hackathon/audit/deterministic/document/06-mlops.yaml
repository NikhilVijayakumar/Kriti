system_id: python_hackathon
domain: mlops
scope: document
kind: deterministic
standard_version: "1.0"
total_rules: 4
total_weight: 4.0

description: "Rules checking MLOps tracking tools and pipeline quality."

rules:
  - id: mlp-001
    description: "DVC configuration exists"
    condition: "repository contains .dvc or dvc.yaml"
    message: "No DVC configuration found for dataset lineage."
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: file_presence
      targets: [.dvc, dvc.yaml]

  - id: mlp-002
    severity: warning
    weight: 1
    description: "MLflow configuration exists"
    check:
      file_globs:
        - "mlruns/**"
        - "mlflow.ini"
        - "mlflow.yaml"
        - "mlprojects/**"

  - id: mlp-003
    description: "DVC pipeline has real stages, not an empty/placeholder file"
    condition: "dvc.yaml declares at least 1 pipeline stage"
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: tool_execution
      target: dvc_stage_count
      threshold: 1
      op: gte

  - id: mlp-004
    description: "MLflow has recorded at least one real run"
    condition: "mlruns/ contains at least 1 run directory"
    severity: warning
    weight: 1.0
    mandatory: false
    evidence:
      type: tool_execution
      target: mlflow_run_count
      threshold: 1
      op: gte
