system_id: python_hackathon
domain: team-workflow
scope: document
kind: semantic

description: "Semantic evaluation of team self-organization and task division."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Analyze the README.md and project structure.
  How effectively did the team self-organize? 
  Did they divide tasks smoothly (e.g., separating data collection, model training, and API building)? 
  Is there evidence of a clear workflow with peer-reviewed work, or did one person do all the heavy lifting?
  Provide a score out of 100 based on the presence of collaborative evidence.
  
evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
