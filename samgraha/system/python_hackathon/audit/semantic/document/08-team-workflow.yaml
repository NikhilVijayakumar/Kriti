system_id: python_hackathon
domain: team-workflow
scope: document
kind: semantic

description: "Semantic evaluation of team self-organization, reliability, speed, and clean structuring."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Analyze the README.md, commit history, and project structure.
  Evaluate three things explicitly:
  (1) Reliability — does the project run without manual intervention, are dependencies pinned and reproducible;
  (2) Speed — is there evidence the team worked efficiently (steady commit cadence rather than one late burst);
  (3) Clean structuring — is the codebase organized into clear separations (data collection, model training, API serving) rather than one monolithic script.
  Did the team divide tasks smoothly, and is there evidence of peer-reviewed pull requests rather than one person doing all the work?
  Score based on all three dimensions.

evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
