system_id: python_hackathon
domain: runtime
scope: document
kind: semantic

description: "Semantic evaluation of runtime performance quality, memory efficiency, and API design robustness."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Analyze the repository's inference pipeline and runtime characteristics.
  Is the model inference pipeline designed to be memory-efficient and suitable for 12GB VRAM hardware?
  Does the team demonstrate awareness of optimization techniques (e.g. quantization, batching)?
  Is the predict() API clean, well-documented, and backwards-compatible?
  Is there evidence that the team tested their model within the competition's 30-second inference constraint?
  Provide a score out of 100 based on the runtime quality and constraint awareness.

evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
