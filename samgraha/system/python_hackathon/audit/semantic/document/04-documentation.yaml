system_id: python_hackathon
domain: documentation
scope: document
kind: semantic

description: "Semantic evaluation of the README file."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Evaluate the README.md content.
  Does the Vision section clearly articulate the problem?
  Score out of 100.
  
evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
