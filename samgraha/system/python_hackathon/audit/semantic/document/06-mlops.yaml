system_id: python_hackathon
domain: mlops
scope: document
kind: semantic

description: "Semantic evaluation of experiment reproducibility, model lifecycle management, and data lineage."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Analyze the repository for MLOps maturity and experiment reproducibility.
  Does the team track experiments (e.g. MLflow, DVC, Weights & Biases) to ensure reproducibility?
  Is the model training pipeline well-defined and deterministic given the same inputs?
  Are dataset versions tracked to prevent data drift between training runs?
  Is model versioning and lifecycle management considered?
  Provide a score out of 100 based on the MLOps maturity of the project.

evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
