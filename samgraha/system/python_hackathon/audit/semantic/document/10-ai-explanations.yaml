system_id: python_hackathon
domain: ai-explanations
scope: document
kind: semantic

description: "Semantic evaluation of the quality and reasoning of AI explanations."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Analyze the README.md, prompt templates (if available), and any example outputs provided by the team.
  Evaluate the quality, contextual reasoning, and clarity of the automated AI text explanations generated by their system.
  Do the prompts provide enough context to prevent hallucinations?
  Are the example explanations clear, accurate, and useful to the end-user?
  Provide a score out of 100 based on the AI output quality and prompt engineering robustness.
  
evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
