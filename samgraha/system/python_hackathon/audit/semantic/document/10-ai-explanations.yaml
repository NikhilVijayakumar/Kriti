system_id: python_hackathon
domain: ai-explanations
scope: document
kind: semantic

description: "Semantic evaluation of ML explainability documentation and prediction capability coverage."

metadata_fields:
  - model_identifier
  - provider
  - prompt_version
  - execution_timestamp
  - standard_version

ensemble:
  required_models:
    - claude-3-5-sonnet
    - gemini-1.5-pro
    - gpt-4o

prompt_template: |
  Analyze the README.md only. Do not evaluate model outputs or run any code.
  Does the team document a concrete interpretability method (e.g. SHAP, feature importance,
  attention visualization) applied to their model?
  Does the README describe specific prediction capabilities?
  Match predictions: match winner, win/draw probabilities, scoreline, first team to score,
  total goals, both teams scoring probability.
  Player predictions: goal scoring probability, expected goals, assist probability,
  goalkeeper clean sheet probability.
  Is the explanation of *why* the model makes its predictions clear enough that a non-expert
  judge could follow the reasoning?
  Score based on documentation clarity and methodological soundness — not on whether the
  underlying prediction is accurate.
  Provide a score out of 100.

evidence_requirements:
  - type: json
    schema:
      score: number
      reasoning: string
      evidence: string
