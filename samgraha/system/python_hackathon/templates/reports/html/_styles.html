<style>
  :root{
    /* Color tokens — locked, Primer-exact */
    --canvas:#ffffff;--canvas-subtle:#f6f8fa;--canvas-inset:#eaeef2;
    --border-default:#d0d7de;--border-muted:#d8dee4;
    --fg-default:#1f2328;--fg-muted:#656d76;--fg-subtle:#6e7781;
    --accent-fg:#0969da;--accent-subtle:#ddf4ff;
    --success-fg:#1a7f37;--success-subtle:#dafbe1;--success-emphasis:#2da44e;
    --danger-fg:#cf222e;--danger-subtle:#ffebe9;--danger-emphasis:#cf222e;
    --attention-fg:#9a6700;--attention-subtle:#fff8c5;--attention-emphasis:#bf8700;
    --neutral-subtle:#eaeef2;--shadow-sm:0 1px 0 rgba(31,35,40,0.04);

    /* Space scale — Primer-aligned (4px base) */
    --space-0:0px;--space-1:4px;--space-2:8px;--space-3:16px;
    --space-4:24px;--space-5:32px;--space-6:40px;--space-7:48px;--space-8:64px;

    /* Typography scale — Primer-aligned */
    --text-xs:12px;--text-sm:13px;--text-default:14px;--text-md:16px;
    --text-lg:20px;--text-xl:24px;--text-2xl:32px;--text-3xl:40px;

    /* Font weight */
    --font-weight-normal:400;--font-weight-medium:500;--font-weight-semibold:600;--font-weight-bold:700;

    /* Border radius */
    --borderRadius-small:4px;--borderRadius-medium:6px;--borderRadius-full:2em;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--canvas-subtle);color:var(--fg-default);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif;font-size:var(--text-default);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .mono,code,.num{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;font-variant-numeric:tabular-nums;}
  .page{max-width:960px;margin:0 auto;padding:var(--space-5) var(--space-4) var(--space-8);}
  .page-header{background:var(--canvas);border:1px solid var(--border-default);border-radius:var(--borderRadius-medium);padding:var(--space-4) var(--space-4);margin-bottom:var(--space-4);box-shadow:var(--shadow-sm);}
  .eyebrow{font-size:var(--text-xs);font-weight:var(--font-weight-semibold);letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:var(--space-1);}
  h1{font-size:var(--text-xl);font-weight:var(--font-weight-semibold);margin:0 0 var(--space-3);letter-spacing:-0.01em;}
  .meta-row{display:flex;gap:var(--space-5);flex-wrap:wrap;padding-top:var(--space-3);border-top:1px solid var(--border-muted);}
  .meta-item{display:flex;flex-direction:column;gap:2px;}
  .meta-label{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.04em;color:var(--fg-muted);}
  .meta-value{font-size:var(--text-sm);color:var(--fg-default);}
  section{background:var(--canvas);border:1px solid var(--border-default);border-radius:var(--borderRadius-medium);margin-bottom:var(--space-4);box-shadow:var(--shadow-sm);overflow:hidden;}
  .section-header{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--border-muted);background:var(--canvas-subtle);}
  .section-header h2{font-size:var(--text-default);font-weight:var(--font-weight-semibold);margin:0;}
  .section-body{padding:var(--space-4);}
  .scorecards{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-muted);}
  .scorecard{background:var(--canvas);padding:var(--space-3) var(--space-4);}
  .scorecard .label{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.04em;color:var(--fg-muted);margin-bottom:var(--space-2);}
  .scorecard .value{font-size:var(--text-2xl);font-weight:var(--font-weight-semibold);letter-spacing:-0.02em;}
  .scorecard .sub{font-size:var(--text-xs);color:var(--fg-subtle);margin-top:var(--space-1);}
  .scorecard.final{background:var(--canvas-subtle);}
  .scorecard.final .value{color:var(--attention-fg);}
  .badge{display:inline-flex;align-items:center;gap:var(--space-1);padding:2px var(--space-2);border-radius:var(--borderRadius-full);font-size:var(--text-xs);font-weight:var(--font-weight-medium);line-height:18px;}
  .badge::before{content:"";width:8px;height:8px;border-radius:50%;}
  .badge.success{background:var(--success-subtle);color:var(--success-fg);}
  .badge.success::before{background:var(--success-emphasis);}
  .badge.attention{background:var(--attention-subtle);color:var(--attention-fg);}
  .badge.attention::before{background:var(--attention-emphasis);}
  .badge.danger{background:var(--danger-subtle);color:var(--danger-fg);}
  .badge.danger::before{background:var(--danger-emphasis);}
  .badge.neutral{background:var(--neutral-subtle);color:var(--fg-muted);}
  .badge.neutral::before{background:var(--fg-subtle);}
  table{width:100%;border-collapse:collapse;}
  .stats-table th,.stats-table td{text-align:left;padding:var(--space-3) var(--space-3);border-bottom:1px solid var(--border-muted);font-size:var(--text-sm);}
  .stats-table th{color:var(--fg-muted);font-weight:var(--font-weight-medium);width:38%;}
  .stats-table tr:last-child th,.stats-table tr:last-child td{border-bottom:none;}
  .stats-table td.num{font-weight:var(--font-weight-semibold);font-size:var(--text-default);}
  .delta-pos{color:var(--success-fg);}
  .delta-neg{color:var(--danger-fg);}
  .chart-wrap{padding:var(--space-2) var(--space-1) 0;}
  .chart-legend{display:flex;gap:var(--space-4);margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--border-muted);font-size:var(--text-xs);color:var(--fg-muted);flex-wrap:wrap;}
  .chart-legend .item{display:flex;align-items:center;gap:var(--space-1);}
  .swatch{width:10px;height:10px;border-radius:var(--borderRadius-small);display:inline-block;}
  .narrative h3{font-size:var(--text-default);font-weight:var(--font-weight-semibold);margin:0 0 var(--space-2);padding-bottom:var(--space-1);border-bottom:1px solid var(--border-muted);}
  .narrative .block{margin-bottom:var(--space-4);}
  .narrative .block:last-child{margin-bottom:0;}
  .narrative p{margin:0;color:var(--fg-default);font-size:13.5px;line-height:1.65;}
  .narrative code{background:var(--canvas-inset);padding:1px 5px;border-radius:var(--borderRadius-small);font-size:12.5px;}
  .lb-table{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
  .lb-table th,.lb-table td{padding:var(--space-3) var(--space-3);border-bottom:1px solid var(--border-muted);text-align:left;}
  .lb-table th{color:var(--fg-muted);font-weight:var(--font-weight-medium);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.04em;}
  .lb-table tr:last-child th,.lb-table tr:last-child td{border-bottom:none;}
  .lb-table td.num{text-align:right;font-weight:var(--font-weight-semibold);font-variant-numeric:tabular-nums;}
  .lb-table td.rank{text-align:center;font-weight:var(--font-weight-bold);width:40px;}
  .lb-table tr.gold{background:var(--attention-subtle);}
  .lb-table tr.silver{background:var(--neutral-subtle);}
  .lb-table tr.bronze{background:var(--canvas-subtle);}
  .rule-table{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
  .rule-table th,.rule-table td{padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--border-muted);text-align:left;}
  .rule-table th{color:var(--fg-muted);font-weight:var(--font-weight-medium);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.04em;}
  .rule-table tr:last-child th,.rule-table tr:last-child td{border-bottom:none;}
  .rule-detail{margin-bottom:var(--space-4);padding:var(--space-3) var(--space-3);background:var(--canvas-subtle);border-radius:var(--borderRadius-medium);}
  .rule-detail:last-child{margin-bottom:0;}
  .rule-detail h4{margin:0 0 var(--space-1);font-size:var(--text-sm);}
  .rule-detail .meta{font-size:var(--text-xs);color:var(--fg-muted);margin-bottom:var(--space-1);}
  .rule-detail p{margin:0;font-size:var(--text-sm);line-height:1.6;}
  .model-card{margin-bottom:var(--space-3);padding:var(--space-3) var(--space-3);background:var(--canvas-subtle);border-radius:var(--borderRadius-medium);}
  .model-card:last-child{margin-bottom:0;}
  .model-card h4{margin:0 0 var(--space-1);font-size:var(--text-sm);}
  .model-card p{margin:0;font-size:var(--text-sm);line-height:1.6;color:var(--fg-default);}
  .domain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-3);}
  .domain-cell{padding:var(--space-3) var(--space-3);background:var(--canvas-subtle);border-radius:var(--borderRadius-medium);}
  .domain-cell .name{font-size:var(--text-xs);color:var(--fg-muted);margin-bottom:var(--space-1);}
  .domain-cell .score{font-size:var(--text-lg);font-weight:var(--font-weight-semibold);}
  .team-profile dt{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.04em;color:var(--fg-muted);margin-bottom:2px;}
  .team-profile dd{margin:0 0 var(--space-3);font-size:var(--text-sm);color:var(--fg-default);}
  .team-profile dd:last-child{margin-bottom:0;}
  footer{text-align:center;font-size:var(--text-xs);color:var(--fg-subtle);padding-top:var(--space-2);}
  @media print{.page{padding:0;}body{background:white;}}
</style>
