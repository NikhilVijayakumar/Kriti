id: deterministic_09_data_quality
calculation: weighted_pass_rate
scope: document
inputs:
  from: audit/deterministic/document/09-data-quality.yaml
  fields: [id, weight, mandatory, passed]
formula: |
  score = 100 * (sum(weight) where passed=true) / (sum(weight), all rules)
rollup: null
note: Specific deterministic calculation for data-quality.
