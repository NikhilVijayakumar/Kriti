id: aggregation_05_security
calculation: weighted_merge
scope: domain
inputs:
  deterministic: calculation/deterministic/document/05-security.yaml
  semantic: calculation/semantic/ensemble/05-security.yaml
weights:
  deterministic: 0.60
  semantic: 0.40
formula: |
  final_score = (deterministic.score * weights.deterministic) + (semantic.score * weights.semantic)
