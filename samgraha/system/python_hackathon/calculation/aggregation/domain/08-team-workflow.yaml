id: aggregation_08_team-workflow
calculation: weighted_merge
scope: domain
inputs:
  deterministic: calculation/deterministic/document/08-team-workflow.yaml
  semantic: calculation/semantic/ensemble/08-team-workflow.yaml
weights:
  deterministic: 0.60
  semantic: 0.40
formula: |
  final_score = (deterministic.score * weights.deterministic) + (semantic.score * weights.semantic)
