id: aggregation_09_data_quality
calculation: weighted_merge
scope: domain
inputs:
  deterministic: calculation/deterministic/document/09-data-quality.yaml
  semantic: calculation/semantic/ensemble/09-data-quality.yaml
weights:
  deterministic: 0.60
  semantic: 0.40
formula: |
  final_score = (deterministic.score * weights.deterministic) + (semantic.score * weights.semantic)
