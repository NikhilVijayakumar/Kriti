id: aggregation_06_mlops
calculation: weighted_merge
scope: domain
inputs:
  deterministic: calculation/deterministic/document/06-mlops.yaml
  semantic: calculation/semantic/ensemble/06-mlops.yaml
weights:
  deterministic: 0.60
  semantic: 0.40
formula: |
  final_score = (deterministic.score * weights.deterministic) + (semantic.score * weights.semantic)
