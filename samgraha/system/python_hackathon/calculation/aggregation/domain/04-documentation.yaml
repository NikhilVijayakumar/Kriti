id: aggregation_04_documentation
calculation: weighted_merge
scope: domain
inputs:
  deterministic: calculation/deterministic/document/04-documentation.yaml
  semantic: calculation/semantic/ensemble/04-documentation.yaml
weights:
  deterministic: 0.60
  semantic: 0.40
formula: |
  final_score = (deterministic.score * weights.deterministic) + (semantic.score * weights.semantic)
