id: semantic_04_documentation
calculation: reliability_aware_ensemble
scope: document
inputs:
  from: audit/semantic/document/04-documentation.yaml
  fields: [model, score, reasoning, evidence]
formula: |
  mean_score = mean(scores)
  stdev_score = stdev(scores)
  agreement = "High" if stdev_score <= 5 else "Medium" if stdev_score <= 15 else "Low"
  final_score = mean_score
outputs:
  - score
  - agreement
  - stdev
